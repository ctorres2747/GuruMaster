function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (<><div className="twk-sect">{label}</div>{children}</>);
}
function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>
      {children}
    </div>
  );
}
function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (<button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>))}
      </div>
    </TweakRow>
  );
}
function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => { const v = typeof o === 'object' ? o.value : o; const l = typeof o === 'object' ? o.label : o; return <option key={v} value={v}>{l}</option>; })}
      </select>
    </TweakRow>
  );
}
function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder} onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}
function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => { if (min != null && n < min) return min; if (max != null && n > max) return max; return n; };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => { const raw = startRef.current.val + (ev.clientX - startRef.current.x) * step; onChange(clamp(Number((Math.round(raw / step) * step).toFixed(decimals)))); };
    const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step} onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}
function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}
function TweakButton({ label, onClick, secondary = false }) {
  return (<button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'} onClick={onClick}>{label}</button>);
}
Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakSlider, TweakToggle, TweakRadio, TweakSelect, TweakText, TweakNumber, TweakColor, TweakButton });
</script>

// ─── TELEMETRY GAUGE ─────────────────────────────────────────────────────────
const Gauge = ({ value, max, label, unit, warn, crit }) => {
  const pct = Math.min(value / max, 1);
  const angle = pct * 220;
  const r = 34;
  const cx = 44, cy = 48;
  const startAngle = -200;
  const toRad = d => (d * Math.PI) / 180;
  const arcPath = (start, end, radius) => {
    const s = { x: cx + radius * Math.cos(toRad(start)), y: cy + radius * Math.sin(toRad(start)) };
    const e = { x: cx + radius * Math.cos(toRad(end)),   y: cy + radius * Math.sin(toRad(end)) };
    const large = end - start > 180 ? 1 : 0;
    return `M ${s.x} ${s.y} A ${radius} ${radius} 0 ${large} 1 ${e.x} ${e.y}`;
  };
  const color = value >= crit ? '#ef4444' : value >= warn ? '#f59e0b' : '#00b894';
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
      <svg width="88" height="72" viewBox="0 0 88 72">
        <path d={arcPath(startAngle, startAngle + 220, r)} stroke="var(--border)" strokeWidth="5" fill="none" strokeLinecap="round" />
        <path
          d={arcPath(startAngle, startAngle + angle, r)}
          stroke={color} strokeWidth="5" fill="none" strokeLinecap="round"
          style={{ transition:'d 1.2s cubic-bezier(0.34,1.56,0.64,1), stroke 0.5s' }}
        />
        <text x={cx} y={cy - 6} textAnchor="middle" fontSize="13" fontWeight="700" fill={color} fontFamily="var(--font-mono)">{value}</text>
        <text x={cx} y={cy + 8} textAnchor="middle" fontSize="9" fill="var(--text-muted)" fontFamily="var(--font-mono)">{unit}</text>
      </svg>
      <span style={{ fontSize:10, color:'var(--text-secondary)', fontFamily:'var(--font-mono)', letterSpacing:'0.05em' }}>{label}</span>
    </div>
  );
};

// ─── MARKDOWN-LIKE TEXT RENDERER ─────────────────────────────────────────────
const GuruText = ({ text }) => {
  const lines = text.split('\n');
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
      {lines.map((line, i) => {
        if (!line) return <div key={i} style={{ height:6 }} />;
        const parts = line.split(/(\*\*[^*]+\*\*)/g).map((part, j) =>
          part.startsWith('**') ? <strong key={j} style={{ color:'var(--text-primary)', fontWeight:600 }}>{part.slice(2,-2)}</strong> : part
        );
        const isCheckbox = line.startsWith('- [ ]');
        const isBullet = line.startsWith('- ');
        const isNumbered = /^\d+\./.test(line);
        const isDocRef = line.startsWith('📄');
        if (isDocRef) return (
          <div key={i} style={{ marginTop:8, padding:'8px 12px', background:'var(--teal-subtle)', border:'1px solid var(--teal-dim)', borderRadius:6, fontSize:13, color:'var(--text-teal)' }}>
            {parts}
          </div>
        );
        if (isCheckbox) return (
          <div key={i} style={{ display:'flex', gap:8, alignItems:'center', paddingLeft:8 }}>
            <div style={{ width:14, height:14, border:'1.5px solid var(--border-light)', borderRadius:3, flexShrink:0 }} />
            <span style={{ fontSize:13, color:'var(--text-secondary)' }}>{line.slice(6)}</span>
          </div>
        );
        if (isBullet || isNumbered) return (
          <div key={i} style={{ display:'flex', gap:8, paddingLeft:8 }}>
            <span style={{ color:'var(--teal)', fontSize:13, flexShrink:0 }}>{isNumbered ? line.match(/^\d+/)[0]+'.' : '·'}</span>
            <span style={{ fontSize:13, color:'var(--text-secondary)' }}>{isNumbered ? parts.slice(1) : parts.slice(1)}</span>
          </div>
        );
        return <p key={i} style={{ fontSize:13, lineHeight:1.65, color:'var(--text-secondary)' }}>{parts}</p>;
      })}
    </div>
  );
};

        </div>

        {/* ── CENTER: DOCUMENT VIEWER ── */}
        <div style={{ flex:'0 0 35%', display:'flex', flexDirection:'column', borderRight:'1px solid var(--border)', overflow:'hidden' }}>

          {/* Doc header */}
          <div style={{ padding:'10px 14px', borderBottom:'1px solid var(--border)', background:'var(--bg-surface)', display:'flex', alignItems:'center', gap:10 }}>
            <Icon name="file-text" size={14} color="var(--text-secondary)" />
            <span style={{ fontSize:12, fontFamily:'var(--font-mono)', color:'var(--text-secondary)', letterSpacing:'0.06em' }}>VISOR DE DOCUMENTOS</span>
          </div>

          {/* Doc list */}
          <div style={{ padding:'10px 14px', borderBottom:'1px solid var(--border)', display:'flex', gap:6, flexWrap:'wrap' }}>
            {docs.map(d => (
              <button key={d.id} onClick={() => { setActiveDoc(d); setHighlightSection(null); }}
                style={{
                  padding:'4px 10px', borderRadius:4, border:`1px solid ${activeDoc?.id===d.id ? 'var(--teal-dim)' : 'var(--border)'}`,
                  background: activeDoc?.id===d.id ? 'var(--teal-subtle)' : 'transparent',
                  color: activeDoc?.id===d.id ? 'var(--teal)' : 'var(--text-muted)',
                  fontSize:10, fontFamily:'var(--font-mono)', cursor:'pointer',
                  display:'flex', alignItems:'center', gap:5,
                }}>
                <Icon name={d.type==='pid' ? 'git-fork' : d.type==='procedure' ? 'list-checks' : 'book-open'} size={10} />
                {d.type==='pid' ? 'P&ID' : d.type==='procedure' ? 'PROC' : 'MAN'}
              </button>
            ))}
          </div>

          {/* Document content */}
          <div style={{ flex:1, overflowY:'auto', padding:'16px 20px', fontFamily:'var(--font-mono)' }}>
            <div style={{ marginBottom:16 }}>
              <div style={{ fontSize:13, color:'var(--text-primary)', fontWeight:600, marginBottom:4 }}>{activeDoc?.title}</div>
              <div style={{ fontSize:10, color:'var(--text-muted)' }}>{activeDoc?.pages} páginas · Revisión: 2026-Q1</div>
            </div>

            {/* Highlighted section if any */}
            {highlightSection && (
              <div className="doc-highlight animate-in" style={{ padding:'12px 14px', marginBottom:16, borderRadius:6 }}>
                <div style={{ fontSize:10, color:'var(--teal)', fontFamily:'var(--font-mono)', marginBottom:6, letterSpacing:'0.08em' }}>▶ REFERENCIADO POR EL ORÁCULO</div>
                <div style={{ fontSize:12, color:'var(--text-primary)', fontWeight:600, marginBottom:8 }}>{highlightSection}</div>
                <div style={{ fontSize:12, color:'var(--text-secondary)', lineHeight:1.7 }}>
                  Este fragmento contiene la información técnica relevante para tu consulta. Las especificaciones de diagnóstico aquí descritas aplican al modelo y configuración actual del activo seleccionado.
                </div>
              </div>
            )}

            {/* Mock document body */}
            {activeDoc?.type === 'pid' ? (
              <div style={{ border:'1px solid var(--border)', borderRadius:8, overflow:'hidden' }}>
                <div style={{ background:'var(--bg-raised)', padding:'12px', fontSize:10, color:'var(--text-muted)', textAlign:'center', marginBottom:0 }}>
                  Diagrama P&ID — {activeAsset.name}
                </div>
                {/* SVG P&ID placeholder */}
                <svg viewBox="0 0 400 260" style={{ width:'100%', background:'var(--bg-raised)' }}>
                  {/* Grid lines */}
                  {[0,1,2,3].map(i => <line key={`h${i}`} x1="0" y1={65*i+30} x2="400" y2={65*i+30} stroke="var(--border)" strokeWidth="0.5" />)}
                  {[0,1,2,3,4,5].map(i => <line key={`v${i}`} x1={70*i+10} y1="0" x2={70*i+10} y2="260" stroke="var(--border)" strokeWidth="0.5" />)}

                  {/* Vessel */}
                  <rect x="160" y="80" width="80" height="100" rx="4" stroke="var(--text-muted)" strokeWidth="1.5" fill="none" />
                  <text x="200" y="135" textAnchor="middle" fontSize="9" fill="var(--text-muted)" fontFamily="var(--font-mono)">V-101</text>

                  {/* Pump */}
                  <circle cx="80" cy="180" r="20" stroke="var(--teal)" strokeWidth="1.5" fill="none" />
                  <text x="80" y="185" textAnchor="middle" fontSize="8" fill="var(--teal)" fontFamily="var(--font-mono)">P-001</text>

                  {/* Heat exchanger */}
                  <rect x="290" y="110" width="60" height="40" rx="2" stroke="var(--amber)" strokeWidth="1.5" fill="none" />
                  <text x="320" y="135" textAnchor="middle" fontSize="8" fill="var(--amber)" fontFamily="var(--font-mono)">E-101</text>

                  {/* Lines */}
                  <path d="M 100 180 L 160 180 L 160 130" stroke="var(--text-muted)" strokeWidth="1.2" fill="none" />
                  <path d="M 240 130 L 290 130" stroke="var(--text-muted)" strokeWidth="1.2" fill="none" />
                  <path d="M 240 160 L 260 160 L 260 200 L 320 200 L 320 150" stroke="var(--text-muted)" strokeWidth="1.2" fill="none" />

                  {/* Valves */}
                  <polygon points="130,175 130,185 140,180" fill="none" stroke="var(--text-secondary)" strokeWidth="1" />
                  <polygon points="140,175 140,185 130,180" fill="none" stroke="var(--text-secondary)" strokeWidth="1" />

                  {/* Labels */}
                  <text x="200" y="20" textAnchor="middle" fontSize="10" fill="var(--text-muted)" fontFamily="var(--font-mono)">P&ID — {activeAsset.id} — Rev. A3</text>
                </svg>
              </div>
            ) : (
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                {['1. Descripción General del Equipo', '2. Especificaciones Técnicas', '3. Condiciones Operacionales', '4. Diagnóstico y Solución de Fallas', '5. Mantenimiento Preventivo', '6. Procedimientos de Seguridad'].map((section, i) => (
                  <div key={i} style={{
                    padding:'10px 12px', borderRadius:6,
                    background: highlightSection && i === 3 ? 'var(--teal-subtle)' : 'var(--bg-raised)',
                    border: `1px solid ${highlightSection && i === 3 ? 'var(--teal-dim)' : 'var(--border)'}`,
                    cursor:'pointer', transition:'all 0.2s',
                  }}>
                    <div style={{ fontSize:12, color: highlightSection && i===3 ? 'var(--teal)' : 'var(--text-secondary)', fontWeight:500, display:'flex', alignItems:'center', gap:8 }}>
                      {highlightSection && i===3 && <span style={{ color:'var(--teal)', fontSize:10 }}>▶</span>}
                      {section}
                    </div>
                    {highlightSection && i===3 && (
                      <div style={{ marginTop:8, fontSize:11, color:'var(--text-secondary)', lineHeight:1.65 }}>
                        {highlightSection} — Ver referencia del Oráculo para contexto específico del activo actual.
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* ── RIGHT: TELEMETRY + TIMELINE ── */}
        <div style={{ flex:'0 0 23%', display:'flex', flexDirection:'column', overflow:'hidden' }}>

          {/* Tab switcher */}
          <div style={{ display:'flex', borderBottom:'1px solid var(--border)', background:'var(--bg-surface)' }}>
            {[['telemetry','activity','TELEMETRÍA'], ['timeline','history','HISTORIAL']].map(([key, icon, label]) => (
              <button key={key} onClick={() => setSidebarTab(key)}
                style={{
                  flex:1, padding:'11px 8px', border:'none', cursor:'pointer',
                  background: sidebarTab===key ? 'var(--bg-raised)' : 'transparent',
                  borderBottom: sidebarTab===key ? '2px solid var(--teal)' : '2px solid transparent',
                  color: sidebarTab===key ? 'var(--teal)' : 'var(--text-muted)',
                  fontSize:9, fontFamily:'var(--font-mono)', letterSpacing:'0.1em',
                  display:'flex', alignItems:'center', justifyContent:'center', gap:5,
                  transition:'all 0.2s',
                }}>
                <Icon name={icon} size={11} />
                {label}
              </button>
            ))}
          </div>

          {sidebarTab === 'telemetry' ? (
            <div style={{ flex:1, overflowY:'auto', padding:'14px 12px', display:'flex', flexDirection:'column', gap:12 }}>

              {/* Asset info */}
              <div style={{ padding:'10px 12px', background:'var(--bg-raised)', border:'1px solid var(--border)', borderRadius:8 }}>
                <div style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:4 }}>{activeAsset.location}</div>
                <div style={{ fontSize:12, color:'var(--text-primary)', fontWeight:600, marginBottom:8 }}>{activeAsset.id}</div>
                <StatusBadge status={activeAsset.status} />
              </div>

              {/* Gauges */}
              <div style={{ padding:'12px', background:'var(--bg-raised)', border:'1px solid var(--border)', borderRadius:8 }}>
                <div style={{ fontSize:9, color:'var(--text-muted)', fontFamily:'var(--font-mono)', letterSpacing:'0.1em', marginBottom:10 }}>
                  ● TIEMPO REAL
                </div>
                <div style={{ display:'flex', justifyContent:'space-around', flexWrap:'wrap', gap:8 }}>
                  <Gauge value={Math.round(t.temp)} max={t.tempMax} label="TEMP" unit="°C" warn={90} crit={110} />
                  <Gauge value={+t.pressure.toFixed(1)} max={t.pressureMax} label="PRESIÓN" unit="bar" warn={6.5} crit={7.5} />
                  <Gauge value={+t.vibration.toFixed(1)} max={t.vibrationMax} label="VIBR" unit="mm/s" warn={7.5} crit={10} />
                </div>
              </div>

              {/* Trend bars */}
              {[
                { label:'Temperatura', value: t.temp, max: t.tempMax, unit:'°C', warn:90, crit:110 },
                { label:'Presión', value: t.pressure, max: t.pressureMax, unit:'bar', warn:6.5, crit:7.5 },
                { label:'Vibración', value: t.vibration, max: t.vibrationMax, unit:'mm/s', warn:7.5, crit:10 },
              ].map(({ label, value, max, unit, warn, crit }) => {
                const pct = Math.min(value / max * 100, 100);
                const color = value >= crit ? '#ef4444' : value >= warn ? '#f59e0b' : '#00b894';
                return (
                  <div key={label} style={{ padding:'10px 12px', background:'var(--bg-raised)', border:'1px solid var(--border)', borderRadius:8 }}>
                    <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                      <span style={{ fontSize:10, color:'var(--text-secondary)', fontFamily:'var(--font-mono)' }}>{label}</span>
                      <span style={{ fontSize:11, color, fontFamily:'var(--font-mono)', fontWeight:600 }}>{typeof value === 'number' ? value.toFixed(1) : value} {unit}</span>
                    </div>
                    <div style={{ height:4, background:'var(--border)', borderRadius:2, overflow:'hidden' }}>
                      <div style={{ height:'100%', width:`${pct}%`, background:color, borderRadius:2, transition:'width 1s ease, background 0.5s' }} />
                    </div>
                    <div style={{ display:'flex', justifyContent:'space-between', marginTop:4 }}>
                      <span style={{ fontSize:9, color:'var(--text-muted)', fontFamily:'var(--font-mono)' }}>0</span>
                      <span style={{ fontSize:9, color:'var(--text-muted)', fontFamily:'var(--font-mono)' }}>{max} {unit}</span>
                    </div>
                  </div>
                );
              })}

              {/* Quick actions */}
              <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                {['Diagnóstico rápido', 'Exportar reporte', 'Crear orden de trabajo'].map((label, i) => (
                  <button key={i} onClick={() => { if(i===0) sendMessage(`Diagnóstico completo para ${activeAsset.id}`); }}
                    style={{
                      padding:'8px 12px', background:'var(--bg-raised)', border:'1px solid var(--border)',
                      borderRadius:6, color:'var(--text-secondary)', fontSize:11, fontFamily:'var(--font-mono)',
                      cursor:'pointer', textAlign:'left', display:'flex', alignItems:'center', gap:8,
                      transition:'all 0.2s',
                    }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor='var(--teal-dim)'; e.currentTarget.style.color='var(--teal)'; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--text-secondary)'; }}>
                    <Icon name={['zap','download','plus-circle'][i]} size={12} />
                    {label}
                  </button>
                ))}
              </div>
            </div>
          ) : (
            /* TIMELINE */
            <div style={{ flex:1, overflowY:'auto', padding:'14px 12px', display:'flex', flexDirection:'column', gap:0 }}>
              <div style={{ fontSize:9, color:'var(--text-muted)', fontFamily:'var(--font-mono)', letterSpacing:'0.1em', marginBottom:12 }}>
                HISTORIAL DE VIDA — {activeAsset.id} ({timeline.length} EVENTOS)
              </div>
              <div style={{ position:'relative', paddingLeft:20 }}>
                <div style={{ position:'absolute', left:7, top:0, bottom:0, width:1, background:'var(--border)' }} />
                {timeline.map((evt, i) => (
                  <div key={i} className="animate-in" style={{ marginBottom:16, position:'relative' }}>
                    <div style={{
                      position:'absolute', left:-13, top:3, width:8, height:8, borderRadius:'50%',
                      background: severityColor[evt.severity] || 'var(--text-muted)',
                      boxShadow: `0 0 6px ${severityColor[evt.severity]}`,
                    }} />
                    <div style={{ padding:'10px 12px', background:'var(--bg-raised)', border:`1px solid ${evt.severity==='critical' ? 'rgba(239,68,68,0.3)' : 'var(--border)'}`, borderRadius:8 }}>
                      <div style={{ fontSize:9, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginBottom:4 }}>{evt.date} · {evt.tech}</div>
                      <div style={{ fontSize:12, color:'var(--text-primary)', fontWeight:500, marginBottom:4 }}>{evt.title}</div>
                      <div style={{ fontSize:11, color:'var(--text-secondary)', lineHeight:1.5 }}>{evt.note}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── COMMAND PALETTE ── */}
      {cmdOpen && (
        <div className="cmd-overlay" onClick={e => { if(e.target===e.currentTarget) setCmdOpen(false); }}>
          <div className="cmd-box animate-in">
            <div style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 16px', borderBottom:'1px solid var(--border)' }}>
              <Icon name="search" size={16} color="var(--teal)" />
              <input
                ref={cmdRef}
                value={cmdQuery}
                onChange={e => setCmdQuery(e.target.value)}
                onKeyDown={e => { if(e.key==='Enter') { sendMessage(cmdQuery); setCmdQuery(''); } if(e.key==='Escape') setCmdOpen(false); }}
                placeholder="Consulta al Oráculo... pregunta cualquier cosa sobre el activo"
                style={{ flex:1, background:'transparent', border:'none', outline:'none', color:'var(--text-primary)', fontSize:15, fontFamily:'var(--font-sans)' }}
              />
              <kbd style={{ padding:'2px 8px', background:'var(--bg-hover)', border:'1px solid var(--border)', borderRadius:4, fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)' }}>ESC</kbd>
            </div>
            <div style={{ padding:'8px' }}>
              {['¿Cuál es la causa probable de la vibración?', 'Procedimiento de arranque seguro', 'Estado del mantenimiento preventivo', `Diagnóstico de temperatura para ${activeAsset.id}`].map((s, i) => (
                <button key={i} onClick={() => { sendMessage(s); setCmdQuery(''); }}
                  style={{
                    width:'100%', padding:'10px 14px', background:'transparent', border:'none', borderRadius:6,
                    color:'var(--text-secondary)', fontSize:13, textAlign:'left', cursor:'pointer', display:'flex',
                    alignItems:'center', gap:10, transition:'background 0.15s',
                  }}
                  onMouseEnter={e => e.currentTarget.style.background='var(--bg-hover)'}
                  onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                  <Icon name="message-circle" size={13} color="var(--text-muted)" />
                  {s}
                </button>
              ))}
            </div>
            <div style={{ padding:'10px 16px', borderTop:'1px solid var(--border)', display:'flex', gap:16 }}>
              {[['Enter','Consultar'],['↑↓','Navegar'],['Esc','Cerrar']].map(([key, label]) => (
                <div key={key} style={{ display:'flex', gap:5, alignItems:'center' }}>
                  <kbd style={{ padding:'1px 6px', background:'var(--bg-hover)', border:'1px solid var(--border)', borderRadius:3, fontSize:10, color:'var(--text-muted)', fontFamily:'var(--font-mono)' }}>{key}</kbd>
                  <span style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'var(--font-mono)' }}>{label}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── TWEAKS ── */}
      <TweaksPanel>
        <TweakSection label="Apariencia" />
        <TweakToggle label="Modo Oscuro" value={tweaks.darkMode} onChange={v => setTweak('darkMode', v)} />
        <TweakColor label="Color Acento" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
        <TweakSlider label="Tamaño de Texto" value={tweaks.fontSize} min={11} max={16} step={1} unit="px" onChange={v => setTweak('fontSize', v)} />
        <TweakSection label="Layout" />
        <TweakToggle label="Layout Compacto" value={tweaks.compactLayout} onChange={v => setTweak('compactLayout', v)} />
        <TweakToggle label="Mostrar Historial" value={tweaks.showTimeline} onChange={v => setTweak('showTimeline', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
