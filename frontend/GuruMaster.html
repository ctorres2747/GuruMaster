  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;

  .twk-sect:first-child{padding-top:0}

    border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (<><div className="twk-sect">{label}</div>{children}</>);
}
function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>
      {children}
    </div>
  );
}
function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (<button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>))}
      </div>
    </TweakRow>
  );
}
function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => { const v = typeof o === 'object' ? o.value : o; const l = typeof o === 'object' ? o.label : o; return <option key={v} value={v}>{l}</option>; })}
      </select>
    </TweakRow>
  );
}
function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder} onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}
function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => { if (min != null && n < min) return min; if (max != null && n > max) return max; return n; };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => { const raw = startRef.current.val + (ev.clientX - startRef.current.x) * step; onChange(clamp(Number((Math.round(raw / step) * step).toFixed(decimals)))); };
    const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step} onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}
function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}
function TweakButton({ label, onClick, secondary = false }) {
  return (<button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'} onClick={onClick}>{label}</button>);
}
Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakSlider, TweakToggle, TweakRadio, TweakSelect, TweakText, TweakNumber, TweakColor, TweakButton });
</script>

<style>

/*

  Raised:     #F0F2F5  (slightly elevated)

  Text-1:     #111827  (primary — near black)
  Text-2:     #4B5563  (secondary)
  Text-3:     #9CA3AF  (muted/placeholder)

  Success:    #0D7F6E
  Warning:    #D97706
  Danger:     #DC2626
  Info:       #2563EB

  TYPOGRAPHY
  ──────────
  Sans: Inter (headings, UI, body)
  Mono: IBM Plex Mono (data, codes, tags)

  SPACING / RADIUS
  ────────────────
  Radius-sm: 6px   Radius-md: 10px   Radius-lg: 14px   Radius-xl: 20px
  Shadow-sm: 0 1px 3px rgba(0,0,0,.07)
  Shadow-md: 0 4px 16px rgba(0,0,0,.08)
  Shadow-lg: 0 8px 32px rgba(0,0,0,.12)
*/

/* ── LIGHT MODE (default) ── */
:root {
  --base:         #F5F6F8;
  --surface:      #FFFFFF;
  --raised:       #F0F2F5;
  --border:       #E2E6EC;
  --border-plus:  #CBD2DA;

  --teal:         #0D7F6E;
  --teal-mid:     #1A9B87;
  --teal-bg:      #EBF7F5;
  --teal-border:  #A7D9D2;
  --teal-text:    #0A6558;

  --ink-1:        #111827;
  --ink-2:        #4B5563;
  --ink-3:        #9CA3AF;

  --success:      #0D7F6E;
  --success-bg:   #EBF7F5;
  --warn:         #D97706;
  --warn-bg:      #FEF3C7;
  --danger:       #DC2626;
  --danger-bg:    #FEE2E2;
  --info:         #2563EB;
  --info-bg:      #DBEAFE;

  --shadow-sm:    0 1px 3px rgba(17,24,39,.06), 0 1px 2px rgba(17,24,39,.04);
  --shadow-md:    0 4px 16px rgba(17,24,39,.08), 0 2px 4px rgba(17,24,39,.05);
  --shadow-lg:    0 8px 32px rgba(17,24,39,.12), 0 4px 8px rgba(17,24,39,.06);

  --r-sm:   6px;
  --r-md:   10px;
  --r-lg:   14px;
  --r-xl:   20px;

  --font:   'Inter', -apple-system, sans-serif;
  --mono:   'IBM Plex Mono', monospace;
}

/* ── DARK MODE ── */
[data-theme="dark"] {
  --base:         #0F1117;
  --surface:      #161B26;
  --raised:       #1E2533;
  --border:       #2A3348;
  --border-plus:  #3A4560;

  --teal:         #1DB897;
  --teal-mid:     #25D4AF;
  --teal-bg:      rgba(29,184,151,.12);
  --teal-border:  rgba(29,184,151,.3);
  --teal-text:    #4ECFB5;

  --ink-1:        #E8EDF5;
  --ink-2:        #8B95A8;
  --ink-3:        #4A5568;

  --success:      #1DB897;
  --success-bg:   rgba(29,184,151,.12);
  --warn:         #F59E0B;
  --warn-bg:      rgba(245,158,11,.12);
  --danger:       #F87171;
  --danger-bg:    rgba(248,113,113,.12);
  --info:         #60A5FA;
  --info-bg:      rgba(96,165,250,.12);

  --shadow-sm:    0 1px 3px rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.2);
  --shadow-md:    0 4px 16px rgba(0,0,0,.35), 0 2px 4px rgba(0,0,0,.2);
  --shadow-lg:    0 8px 40px rgba(0,0,0,.5),  0 4px 8px rgba(0,0,0,.3);
}

/* Report modal print styles */
@media print {
  body > #root { display: none !important; }
  #gm-report   { display: block !important; }
}
#gm-report { display: none; }

html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body { font-family: var(--font); background: var(--base); color: var(--ink-1); -webkit-font-smoothing: antialiased; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-plus); border-radius: 3px; }

/* Animations */
@keyframes pulse-live {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: .5; transform: scale(1.4); }
}
@keyframes slide-up {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes dot-blink {
  0%, 80%, 100% { opacity: .2; transform: scale(.8); }
  40%           { opacity: 1;  transform: scale(1); }
}

.anim-up   { animation: slide-up .25s ease both; }
.anim-fade { animation: fade-in  .2s  ease both; }

/* Typing dots */
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--teal); animation: dot-blink 1.4s infinite ease-in-out; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }

/* ─── LUCIDE ICON ─── */
const Icon = ({ name, size = 15, color, style: extraStyle }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    const key = name.replace(/-([a-z])/g, (_, c) => c.toUpperCase())
                    .replace(/^./, c => c.toUpperCase());
    ref.current.innerHTML = '';
    const el = lucide.createElement(lucide[key]);
    if (!el) return;
    el.setAttribute('width', size);
    el.setAttribute('height', size);
    if (color) el.setAttribute('stroke', color);
    ref.current.appendChild(el);
  }, [name, size, color]);
  return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center', flexShrink: 0, ...extraStyle }} />;
};

/* ─── GAUGE ─── */
const Gauge = ({ value, max, label, unit, warn, crit }) => {
  const pct = Math.min(value / max, 1);
  const r = 30, cx = 40, cy = 44;
  const toRad = d => d * Math.PI / 180;
  const arcPt = (angle, radius) => ({
    x: cx + radius * Math.cos(toRad(angle)),
    y: cy + radius * Math.sin(toRad(angle)),
  });
  const start = -215, sweep = 250;
  const end = start + pct * sweep;
  const s = arcPt(start, r);
  const bg_e = arcPt(start + sweep, r);
  const fg_e = arcPt(end, r);
  const large = pct * sweep > 180 ? 1 : 0;
  const bg_large = sweep > 180 ? 1 : 0;
  const col = value >= crit ? 'var(--danger)' : value >= warn ? 'var(--warn)' : 'var(--success)';
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
      <svg width="80" height="64" viewBox="0 0 80 64">
        <path d={`M ${s.x} ${s.y} A ${r} ${r} 0 ${bg_large} 1 ${bg_e.x} ${bg_e.y}`}
          stroke="var(--border)" strokeWidth="5" fill="none" strokeLinecap="round" />
        {pct > 0.01 && (
          <path d={`M ${s.x} ${s.y} A ${r} ${r} 0 ${large} 1 ${fg_e.x} ${fg_e.y}`}
            stroke={col} strokeWidth="5" fill="none" strokeLinecap="round"
            style={{ transition: 'all 1.1s cubic-bezier(.34,1.56,.64,1)' }} />
        )}
        <text x={cx} y={cy - 5} textAnchor="middle" fontSize="13" fontWeight="700"
          fill={col} fontFamily="var(--mono)">{typeof value === 'number' ? value.toFixed(1) : value}</text>
        <text x={cx} y={cy + 9} textAnchor="middle" fontSize="8.5"
          fill="var(--ink-3)" fontFamily="var(--mono)">{unit}</text>
      </svg>
      <span style={{ fontSize: 10, color: 'var(--ink-3)', fontFamily: 'var(--mono)', letterSpacing: '.04em', textTransform: 'uppercase' }}>{label}</span>
    </div>
  );
};

            <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 18px', borderBottom: '1px solid var(--border)' }}>
              <Icon name="search" size={16} color="var(--teal)" />
              <input ref={cmdRef} value={cmdQuery} onChange={e => setCmdQuery(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') { sendMessage(cmdQuery); setCmdQuery(''); } if (e.key === 'Escape') setCmdOpen(false); }}
                placeholder="Consulta al asistente de mantenimiento…"
                style={{
                  flex: 1, background: 'transparent', border: 'none', outline: 'none',
                  color: 'var(--ink-1)', fontSize: 15, fontFamily: 'var(--font)',
                }}
              />
              <kbd style={{ padding: '2px 7px', background: 'var(--raised)', border: '1px solid var(--border)', borderRadius: 5, fontSize: 10, color: 'var(--ink-3)', fontFamily: 'var(--mono)' }}>ESC</kbd>
            </div>

            {/* Suggestions */}
            <div style={{ padding: '6px 8px' }}>
              <div style={{ padding: '5px 12px', fontSize: 10, color: 'var(--ink-3)', fontWeight: 600, letterSpacing: '.06em', textTransform: 'uppercase' }}>
                Consultas recientes
              </div>
              {SUGGESTIONS.map((s, i) => (
                <button key={i} onClick={() => { sendMessage(s); setCmdQuery(''); }} style={{
                  width: '100%', padding: '9px 14px', background: 'transparent', border: 'none', borderRadius: 'var(--r-md)',
                  color: 'var(--ink-2)', fontSize: 13, textAlign: 'left', display: 'flex', alignItems: 'center', gap: 11,
                  transition: 'background .12s',
                }}
                onMouseEnter={e => e.currentTarget.style.background = 'var(--teal-bg)'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                  <Icon name="message-square" size={14} color="var(--ink-3)" />
                  {s}
                </button>
              ))}
            </div>

            {/* Footer */}
            <div style={{ padding: '10px 18px', borderTop: '1px solid var(--border)', display: 'flex', gap: 16 }}>
              {[['↵', 'Enviar'], ['↑↓', 'Navegar'], ['Esc', 'Cerrar']].map(([k, l]) => (
                <div key={k} style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
                  <kbd style={{ padding: '1px 6px', background: 'var(--raised)', border: '1px solid var(--border)', borderRadius: 4, fontSize: 10, color: 'var(--ink-3)', fontFamily: 'var(--mono)' }}>{k}</kbd>
                  <span style={{ fontSize: 10, color: 'var(--ink-3)' }}>{l}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ════ TWEAKS ════ */}
      <TweaksPanel>
        <TweakSection label="Apariencia" />
        <TweakToggle label="Modo Oscuro" value={tweaks.darkMode} onChange={v => setTweak('darkMode', v)} />
        <TweakColor label="Color de acento" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
        <TweakSlider label="Escala tipográfica" value={tweaks.fontScale} min={0.85} max={1.2} step={0.05} onChange={v => setTweak('fontScale', v)} />
        <TweakSection label="Layout" />
        <TweakSlider label="Ancho panel chat (%)" value={tweaks.leftWidth} min={28} max={52} step={1} onChange={v => setTweak('leftWidth', v)} />
        <TweakToggle label="Mostrar visor de docs" value={tweaks.showDocPanel} onChange={v => setTweak('showDocPanel', v)} />
        <TweakToggle label="Telemetría compacta" value={tweaks.compactTelemetry} onChange={v => setTweak('compactTelemetry', v)} />
      </TweaksPanel>

      {/* ════ REPORT MODAL ════ */}
      {reportOpen && (
        <div className="anim-fade" style={{
          position: 'fixed', inset: 0, zIndex: 300,
          background: 'rgba(17,24,39,.5)', backdropFilter: 'blur(8px)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: 24,
        }} onClick={e => { if (e.target === e.currentTarget) closeReport(); }}>
          <div className="anim-up" style={{
            width: 'min(820px, 95vw)', maxHeight: '92vh',
            background: 'var(--surface)', border: '1px solid var(--border)',
            borderRadius: 'var(--r-xl)', boxShadow: 'var(--shadow-lg)',
            display: 'flex', flexDirection: 'column', overflow: 'hidden',
          }}>
            {/* Modal header */}
            <div style={{
              padding: '16px 24px', borderBottom: '1px solid var(--border)',
              display: 'flex', alignItems: 'center', gap: 12,
            }}>
              <Icon name="file-text" size={16} color="var(--teal)" />
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--ink-1)' }}>Reporte de Estado del Activo</div>
                <div style={{ fontSize: 11, color: 'var(--ink-3)', fontFamily: 'var(--mono)' }}>
                  {asset.id} · Generado {new Date().toLocaleDateString('es', { day:'2-digit', month:'long', year:'numeric' })}
                </div>
              </div>
              <div style={{ flex: 1 }} />
              <button onClick={printReport} style={{
                display: 'flex', alignItems: 'center', gap: 7, padding: '8px 16px',
                background: 'var(--teal)', border: 'none', borderRadius: 'var(--r-md)',
                color: 'white', fontSize: 13, fontWeight: 600,
              }}>
                <Icon name="printer" size={14} color="white" />
                Imprimir / PDF
              </button>
              <button onClick={closeReport} style={{
                width: 32, height: 32, borderRadius: 'var(--r-md)',
                border: '1px solid var(--border)', background: 'var(--raised)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <Icon name="x" size={15} color="var(--ink-3)" />
              </button>
            </div>

            {/* Report body (scrollable) */}
            <div style={{ flex: 1, overflowY: 'auto', padding: '28px 32px', display: 'flex', flexDirection: 'column', gap: 24 }}>

              {/* Header block */}
              <div style={{
                padding: '20px 24px', borderRadius: 'var(--r-lg)',
                background: tweaks.darkMode ? 'var(--raised)' : '#F8FAFC',
                border: '1px solid var(--border)',
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                  <div style={{ width: 44, height: 44, borderRadius: 'var(--r-md)', background: 'var(--teal)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <Icon name="cpu" size={22} color="white" />
                  </div>
                  <div>
                    <div style={{ fontSize: 18, fontWeight: 700, color: 'var(--ink-1)' }}>{asset.name}</div>
                    <div style={{ fontSize: 12, color: 'var(--ink-3)', marginTop: 2 }}>{asset.location}</div>
                  </div>
                </div>
                <StatusBadge status={asset.status} />
              </div>

              {/* Telemetry snapshot */}
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink-3)', letterSpacing: '.08em', textTransform: 'uppercase', marginBottom: 12 }}>
                  Telemetría actual
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
                  {[
                    { label: 'Temperatura', value: telemetry.temp, max: telemetry.tempMax, unit: '°C', warn: 90, crit: 110 },
                    { label: 'Presión',     value: telemetry.pressure, max: telemetry.pressureMax, unit: 'bar', warn: 6.5, crit: 7.5 },
                    { label: 'Vibración',   value: telemetry.vib, max: telemetry.vibMax, unit: 'mm/s', warn: 7.5, crit: 10 },
                  ].map(({ label, value, max, unit, warn, crit }) => {
                    const col = value >= crit ? 'var(--danger)' : value >= warn ? 'var(--warn)' : 'var(--success)';
                    const bg  = value >= crit ? 'var(--danger-bg)' : value >= warn ? 'var(--warn-bg)' : 'var(--success-bg)';
                    return (
                      <div key={label} style={{ padding: '16px', background: bg, border: `1px solid ${col}30`, borderRadius: 'var(--r-lg)', textAlign: 'center' }}>
                        <div style={{ fontSize: 28, fontWeight: 700, color: col, fontFamily: 'var(--mono)', lineHeight: 1 }}>
                          {typeof value === 'number' ? value.toFixed(1) : value}
                        </div>
                        <div style={{ fontSize: 12, color: col, fontFamily: 'var(--mono)', marginBottom: 4 }}>{unit}</div>
                        <div style={{ fontSize: 11, color: 'var(--ink-2)', fontWeight: 500 }}>{label}</div>
                        <div style={{ fontSize: 10, color: 'var(--ink-3)', fontFamily: 'var(--mono)', marginTop: 4 }}>
                          Límite: {max} {unit}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Conversation summary */}
              {messages.length > 1 && (
                <div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink-3)', letterSpacing: '.08em', textTransform: 'uppercase', marginBottom: 12 }}>
                    Consultas al asistente — sesión actual
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {messages.map((m, i) => (
                      <div key={i} style={{
                        padding: '10px 14px', borderRadius: 'var(--r-md)',
                        background: m.role === 'user' ? 'var(--teal-bg)' : 'var(--raised)',
                        border: `1px solid ${m.role === 'user' ? 'var(--teal-border)' : 'var(--border)'}`,
                      }}>
                        <div style={{ fontSize: 10, color: m.role === 'user' ? 'var(--teal-text)' : 'var(--ink-3)', fontWeight: 600, marginBottom: 4, textTransform: 'uppercase', letterSpacing: '.05em' }}>
                          {m.role === 'user' ? '👤 Técnico' : '🤖 GuruMaster'} · {m.time}
                        </div>
                        <div style={{ fontSize: 12, color: 'var(--ink-2)', lineHeight: 1.55 }}>
                          {m.text.replace(/\*\*/g, '').replace(/📄/g, '▶').substring(0, 180)}{m.text.length > 180 ? '…' : ''}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Maintenance history */}
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink-3)', letterSpacing: '.08em', textTransform: 'uppercase', marginBottom: 12 }}>
                  Historial de mantenimiento
                </div>
                <div style={{ border: '1px solid var(--border)', borderRadius: 'var(--r-lg)', overflow: 'hidden' }}>
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                    <thead>
                      <tr style={{ background: 'var(--raised)' }}>
                        {['Fecha', 'Evento', 'Técnico', 'Observaciones'].map(h => (
                          <th key={h} style={{ padding: '10px 14px', textAlign: 'left', fontWeight: 600, color: 'var(--ink-2)', borderBottom: '1px solid var(--border)', fontSize: 11 }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {TIMELINE[asset.id].map((evt, i) => {
                        const s = STATUS[evt.severity] || STATUS.info;
                        return (
                          <tr key={i} style={{ borderBottom: i < TIMELINE[asset.id].length - 1 ? '1px solid var(--border)' : 'none' }}>
                            <td style={{ padding: '10px 14px', color: 'var(--ink-3)', fontFamily: 'var(--mono)', fontSize: 11, whiteSpace: 'nowrap' }}>{evt.date}</td>
                            <td style={{ padding: '10px 14px' }}>
                              <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
                                <span style={{ width: 7, height: 7, borderRadius: '50%', background: s.color, flexShrink: 0 }} />
                                <span style={{ color: 'var(--ink-1)', fontWeight: 500 }}>{evt.title}</span>
                              </div>
                            </td>
                            <td style={{ padding: '10px 14px', color: 'var(--ink-2)', whiteSpace: 'nowrap' }}>{evt.tech}</td>
                            <td style={{ padding: '10px 14px', color: 'var(--ink-2)' }}>{evt.note}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Footer */}
              <div style={{ borderTop: '1px solid var(--border)', paddingTop: 16, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div style={{ fontSize: 11, color: 'var(--ink-3)', fontFamily: 'var(--mono)' }}>
                  GuruMaster Industrial Intelligence Platform · v2.0
                </div>
                <div style={{ fontSize: 11, color: 'var(--ink-3)', fontFamily: 'var(--mono)' }}>
                  Generado: {new Date().toLocaleString('es')}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
